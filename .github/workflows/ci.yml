name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: swift test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build --configuration debug

      - name: Test
        run: swift test --parallel
